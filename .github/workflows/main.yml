name: Fortify FoD DAST Automated Scan
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

env:
  FOD_URL: ${{ vars.FOD_URL }}
  FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
  FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
  FOD_RELEASE: ${{ vars.FOD_RELEASE }}

jobs:
  fod-dast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Fortify tools
        uses: fortify/github-action/setup@v1
        with:
          fcli: latest

      - name: Sanitize FOD_URL
        run: |
          RAW_URL="${FOD_URL}"
          if [[ -z "$RAW_URL" ]]; then
            RAW_URL="https://api.ams.fortify.com"
          fi
          RAW_URL="${RAW_URL%/}"
          if [[ "$RAW_URL" != https://* && "$RAW_URL" != http://* ]]; then
            RAW_URL="https://${RAW_URL}"
          fi
          echo "Resolved FOD_URL: ${RAW_URL}"
          echo "FOD_URL=${RAW_URL}" >> $GITHUB_ENV

      - name: Login to Fortify on Demand
        run: |
          fcli fod session login \
            --url "$FOD_URL" \
            --client-id "$FOD_CLIENT_ID" \
            --client-secret "$FOD_CLIENT_SECRET"

      - name: Resolve Release ID
        run: |
          if [[ -z "$FOD_RELEASE" ]]; then
            echo "ERROR: FOD_RELEASE is not set."
            echo "Set it under: GitHub repo -> Settings -> Variables -> Actions"
            echo "  Name:  FOD_RELEASE"
            echo "  Value: numeric release ID (e.g. 1722152) or App:Release (e.g. ZeroBank:main)"
            fcli fod release list -o table 2>/dev/null || true
            exit 1
          fi

          if [[ "$FOD_RELEASE" =~ ^[0-9]+$ ]]; then
            echo "FOD_RELEASE is a numeric ID: $FOD_RELEASE - using directly."
            echo "FOD_RELEASE_ID=${FOD_RELEASE}" >> $GITHUB_ENV
          else
            APP_NAME="${FOD_RELEASE%%:*}"
            REL_NAME="${FOD_RELEASE##*:}"
            echo "Looking up release '$REL_NAME' in application '$APP_NAME'..."
            RELEASE_ID=$(fcli fod release list \
              -o expr="{releaseId}" \
              -q "releaseName=='${REL_NAME}' && applicationName=='${APP_NAME}'" \
              2>/dev/null | head -1 | tr -d '[:space:]' || true)
            if [[ -z "$RELEASE_ID" ]]; then
              RELEASE_ID=$(fcli fod release list \
                -o expr="{releaseId}" \
                -q "releaseName=='${REL_NAME}'" \
                2>/dev/null | head -1 | tr -d '[:space:]' || true)
            fi
            if [[ -z "$RELEASE_ID" ]]; then
              echo "ERROR: Could not find a release matching '$FOD_RELEASE'."
              fcli fod release list -o table 2>/dev/null || true
              exit 1
            fi
            echo "Resolved Release ID: $RELEASE_ID"
            echo "FOD_RELEASE_ID=${RELEASE_ID}" >> $GITHUB_ENV
          fi

      - name: Configure DAST Scan Settings via REST API
        env:
          FOD_ASSESSMENT_TYPE: ${{ vars.FOD_ASSESSMENT_TYPE }}
        run: |
          ASSESSMENT_TYPE="${FOD_ASSESSMENT_TYPE}"
          if [[ -z "$ASSESSMENT_TYPE" ]]; then
            ASSESSMENT_TYPE="Dynamic Website Assessment"
          fi
          echo "Assessment type: $ASSESSMENT_TYPE"

          # Get Bearer token via curl
          TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")

          if [[ -z "$TOKEN" ]]; then
            echo "ERROR: Could not obtain Bearer token."
            exit 1
          fi
          echo "Bearer token obtained."

          # Fetch assessment types and extract the matching ID
          AT_RESPONSE=$(curl -s -X GET \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/assessment-types?scanType=Dynamic" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json")
          echo "Assessment types response: $AT_RESPONSE"

          # Write Python script to file to avoid YAML quoting issues
          cat > /tmp/get_at_id.py << 'PYEOF'
          import sys, json, os
          data = json.loads(sys.stdin.read())
          items = data.get('items', [])
          target = os.environ.get('ASSESSMENT_TYPE', '').lower()
          for item in items:
              if item.get('name', '').lower() == target:
                  print(item.get('id', ''))
                  sys.exit(0)
          print('')
          PYEOF

          AT_ID=$(echo "$AT_RESPONSE" | python3 /tmp/get_at_id.py)

          if [[ -z "$AT_ID" ]]; then
            echo "WARNING: Could not find assessment type ID for '$ASSESSMENT_TYPE'."
            echo "Available types: $AT_RESPONSE"
            exit 1
          fi
          echo "Assessment Type ID: $AT_ID"

          # Write Python script to build JSON payload
          cat > /tmp/build_payload.py << 'PYEOF'
          import json, os
          at_id = os.environ.get('AT_ID', '0')
          payload = {
              'siteUrl': 'http://zero.webappsecurity.com/',
              'assessmentTypeId': int(at_id) if at_id.isdigit() else 0,
              'entitlementFrequencyType': 'Subscription',
              'scanType': 'Website'
          }
          print(json.dumps(payload))
          PYEOF

          PAYLOAD=$(AT_ID="$AT_ID" python3 /tmp/build_payload.py)
          echo "Payload: $PAYLOAD"

          # Send the scan setup request
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/dast-scans/scan-setup" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" && "$HTTP_CODE" != "204" ]]; then
            echo "ERROR: DAST scan setup failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "DAST scan configured successfully."

      - name: Start FoD DAST Automated Scan
        run: |
          fcli fod dast-scan start \
            --rel "$FOD_RELEASE_ID" \
            --store curScan

      - name: Wait for DAST Scan Completion
        run: |
          fcli fod dast-scan wait-for \
            --rel "$FOD_RELEASE_ID"

      - name: Export Results to GitHub Security
        uses: fortify/github-action/fod-export@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Logout from Fortify on Demand
        if: always()
        run: fcli fod session logout
