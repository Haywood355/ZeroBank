name: Fortify FoD DAST Automated Scan
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write   # Required to publish to GitHub Security tab

env:
  FOD_URL: ${{ vars.FOD_URL }}
  FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
  FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
  FOD_RELEASE: ${{ vars.FOD_RELEASE }}

jobs:
  fod-dast-scan:
    runs-on: ubuntu-latest

    steps:
      # Install fcli via the official Fortify setup action
      - name: Setup Fortify tools
        uses: fortify/github-action/setup@v1
        with:
          fcli: latest

      # Sanitize FOD_URL: fall back to US data center if variable is empty,
      # and ensure the URL always starts with https://.
      - name: Sanitize FOD_URL
        run: |
          RAW_URL="${FOD_URL}"
          if [[ -z "$RAW_URL" ]]; then
            RAW_URL="https://api.ams.fortify.com"
          fi
          RAW_URL="${RAW_URL%/}"
          if [[ "$RAW_URL" != https://* && "$RAW_URL" != http://* ]]; then
            RAW_URL="https://${RAW_URL}"
          fi
          echo "Resolved FOD_URL: ${RAW_URL}"
          echo "FOD_URL=${RAW_URL}" >> $GITHUB_ENV

      # Authenticate to Fortify on Demand
      - name: Login to Fortify on Demand
        run: |
          fcli fod session login \
            --url "$FOD_URL" \
            --client-id "$FOD_CLIENT_ID" \
            --client-secret "$FOD_CLIENT_SECRET"

      # Resolve the release ID.
      # FOD_RELEASE can be a numeric ID (e.g. "1722152") or App:Release name (e.g. "ZeroBank:main").
      - name: Resolve Release ID
        run: |
          if [[ -z "$FOD_RELEASE" ]]; then
            echo "ERROR: FOD_RELEASE is not set."
            echo "Set it under: GitHub repo → Settings → Variables → Actions"
            echo "  Name:  FOD_RELEASE"
            echo "  Value: numeric release ID (e.g. 1722152) or App:Release (e.g. ZeroBank:main)"
            echo ""
            echo "Available releases:"
            fcli fod release list -o table 2>/dev/null || true
            exit 1
          fi

          if [[ "$FOD_RELEASE" =~ ^[0-9]+$ ]]; then
            echo "FOD_RELEASE is a numeric ID: $FOD_RELEASE — using directly."
            echo "FOD_RELEASE_ID=${FOD_RELEASE}" >> $GITHUB_ENV
          else
            APP_NAME="${FOD_RELEASE%%:*}"
            REL_NAME="${FOD_RELEASE##*:}"
            echo "Looking up release '$REL_NAME' in application '$APP_NAME'..."

            RELEASE_ID=$(fcli fod release list \
              -o expr="{releaseId}" \
              -q "releaseName=='${REL_NAME}' && applicationName=='${APP_NAME}'" \
              2>/dev/null | head -1 | tr -d '[:space:]' || true)

            if [[ -z "$RELEASE_ID" ]]; then
              RELEASE_ID=$(fcli fod release list \
                -o expr="{releaseId}" \
                -q "releaseName=='${REL_NAME}'" \
                2>/dev/null | head -1 | tr -d '[:space:]' || true)
            fi

            if [[ -z "$RELEASE_ID" ]]; then
              echo "ERROR: Could not find a release matching '$FOD_RELEASE'."
              fcli fod release list -o table 2>/dev/null || true
              exit 1
            fi

            echo "Resolved Release ID: $RELEASE_ID"
            echo "FOD_RELEASE_ID=${RELEASE_ID}" >> $GITHUB_ENV
          fi

      # Obtain a Bearer token from the active fcli session for direct REST API calls.
      # fcli dast-scan setup-website uses the DAST Automated endpoint which requires
      # a separate tenant feature activation. Instead, we call the standard DAST scan
      # setup REST endpoint directly, which supports Dynamic Website Assessment.
      - name: Configure DAST Scan Settings via REST API
        run: |
          ASSESSMENT_TYPE="${{ vars.FOD_ASSESSMENT_TYPE }}"
          if [[ -z "$ASSESSMENT_TYPE" ]]; then
            ASSESSMENT_TYPE="Dynamic Website Assessment"
          fi

          echo "Fetching Bearer token from active fcli session..."
          TOKEN=$(fcli fod rest call /oauth/token \
            --method POST \
            --data '{"grant_type":"client_credentials","client_id":"'"$FOD_CLIENT_ID"'","client_secret":"'"$FOD_CLIENT_SECRET"'","scope":"api-tenant"}' \
            -o expr="{access_token}" 2>/dev/null || true)

          # Fallback: get token directly via curl
          if [[ -z "$TOKEN" ]]; then
            TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" || true)
          fi

          if [[ -z "$TOKEN" ]]; then
            echo "ERROR: Could not obtain Bearer token."
            exit 1
          fi

          echo "Bearer token obtained successfully."
          echo "Configuring DAST scan for release $FOD_RELEASE_ID with assessment type: $ASSESSMENT_TYPE"

          # Look up the assessment type ID
          AT_ID=$(curl -s -X GET \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/assessment-types?scanType=Dynamic" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json" \
            | python3 -c "
import sys, json
data = json.load(sys.stdin)
items = data.get('items', [])
for item in items:
    if item.get('name','').lower() == '${ASSESSMENT_TYPE}'.lower():
        print(item.get('id',''))
        break
if not items:
    print('')
" || true)

          if [[ -z "$AT_ID" ]]; then
            echo "WARNING: Could not find assessment type ID for '$ASSESSMENT_TYPE'. Will use name directly."
          else
            echo "Assessment Type ID: $AT_ID"
          fi

          # Configure the DAST scan via REST
          PAYLOAD=$(python3 -c "
import json
payload = {
    'siteUrl': 'http://zero.webappsecurity.com/',
    'assessmentTypeId': int('${AT_ID}') if '${AT_ID}'.isdigit() else 0,
    'entitlementFrequencyType': 'Subscription',
    'scanType': 'Website'
}
print(json.dumps(payload))
")

          echo "Sending scan setup payload..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/dast-scans/scan-setup" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" && "$HTTP_CODE" != "204" ]]; then
            echo "ERROR: DAST scan setup failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "DAST scan configured successfully."

      # Start the DAST scan via fcli
      - name: Start FoD DAST Automated Scan
        run: |
          fcli fod dast-scan start \
            --rel "$FOD_RELEASE_ID" \
            --store curScan

      # Poll until scan completes
      - name: Wait for DAST Scan Completion
        run: |
          fcli fod dast-scan wait-for \
            --rel "$FOD_RELEASE_ID"

      # Export SARIF results to GitHub Security tab
      - name: Export Results to GitHub Security
        uses: fortify/github-action/fod-export@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Always clean up the session
      - name: Logout from Fortify on Demand
        if: always()
        run: fcli fod session logout
