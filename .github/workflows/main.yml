name: fod-dast-scan
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

env:
  FOD_URL: ${{ vars.FOD_URL }}
  FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
  FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
  FOD_RELEASE: ${{ vars.FOD_RELEASE }}

jobs:
  fod-dast-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Fortify tools
        uses: fortify/github-action/setup@v1
        with:
          fcli: latest

      - name: Sanitize FOD_URL
        run: |
          RAW_URL="${FOD_URL}"
          if [[ -z "$RAW_URL" ]]; then RAW_URL="https://api.ams.fortify.com"; fi
          RAW_URL="${RAW_URL%/}"
          if [[ "$RAW_URL" != https://* && "$RAW_URL" != http://* ]]; then
            RAW_URL="https://${RAW_URL}"
          fi
          echo "Resolved FOD_URL: ${RAW_URL}"
          echo "FOD_URL=${RAW_URL}" >> $GITHUB_ENV

      - name: Login to Fortify on Demand
        run: |
          fcli fod session login \
            --url "$FOD_URL" \
            --client-id "$FOD_CLIENT_ID" \
            --client-secret "$FOD_CLIENT_SECRET"

      - name: Resolve Release ID
        run: |
          if [[ -z "$FOD_RELEASE" ]]; then
            echo "ERROR: FOD_RELEASE is not set."
            fcli fod release list -o table 2>/dev/null || true
            exit 1
          fi
          if [[ "$FOD_RELEASE" =~ ^[0-9]+$ ]]; then
            echo "FOD_RELEASE is a numeric ID: $FOD_RELEASE - using directly."
            echo "FOD_RELEASE_ID=${FOD_RELEASE}" >> $GITHUB_ENV
          else
            APP_NAME="${FOD_RELEASE%%:*}"
            REL_NAME="${FOD_RELEASE##*:}"
            RELEASE_ID=$(fcli fod release list -o expr="{releaseId}" \
              -q "releaseName=='${REL_NAME}' && applicationName=='${APP_NAME}'" \
              2>/dev/null | head -1 | tr -d '[:space:]' || true)
            if [[ -z "$RELEASE_ID" ]]; then
              RELEASE_ID=$(fcli fod release list -o expr="{releaseId}" \
                -q "releaseName=='${REL_NAME}'" \
                2>/dev/null | head -1 | tr -d '[:space:]' || true)
            fi
            if [[ -z "$RELEASE_ID" ]]; then
              echo "ERROR: Could not find release '$FOD_RELEASE'."
              fcli fod release list -o table 2>/dev/null || true
              exit 1
            fi
            echo "Resolved Release ID: $RELEASE_ID"
            echo "FOD_RELEASE_ID=${RELEASE_ID}" >> $GITHUB_ENV
          fi

      - name: Write helper Python scripts
        run: |
          echo "" | base64 -d > /tmp/get_at_id.py
          echo "" | base64 -d > /tmp/build_payload.py
          echo "" | base64 -d > /tmp/find_inprogress.py
          echo "" | base64 -d > /tmp/get_poll_status.py
          echo "" | base64 -d > /tmp/get_scan_id_from_list.py
          echo "aW1wb3J0IHN5cywganNvbgpkID0ganNvbi5sb2FkKHN5cy5zdGRpbikKcHJpbnQoZC5nZXQoJ3NjYW5JZCcsIGQuZ2V0KCdpZCcsICcnKSkpCg==" | base64 -d > /tmp/get_scan_id.py
          echo "" | base64 -d > /tmp/get_status.py
          echo "aW1wb3J0IHN5cywganNvbgpkYXRhID0ganNvbi5sb2FkKHN5cy5zdGRpbikKaXRlbXMgPSBkYXRhLmdldCgnaXRlbXMnLCBbXSkKaWYgaXRlbXM6CiAgICBwcmludChpdGVtc1swXS5nZXQoJ3NjYW5JZCcsIGl0ZW1zWzBdLmdldCgnaWQnLCAnJykpKQplbHNlOgogICAgcHJpbnQoJycpCg==" | base64 -d > /tmp/get_latest_scan_id.py
          echo "" | base64 -d > /tmp/find_inprogress.py
          echo "" | base64 -d > /tmp/find_active.py
          echo "" | base64 -d > /tmp/list_scans.py
          echo "" | base64 -d > /tmp/list_scans_stdout.py
          echo "Helper scripts written."

      - name: Configure DAST Automated Scan Settings
        env:
          FOD_ASSESSMENT_TYPE: ${{ vars.FOD_ASSESSMENT_TYPE }}
        run: |
          ASSESSMENT_TYPE="${FOD_ASSESSMENT_TYPE}"
          if [[ -z "$ASSESSMENT_TYPE" ]]; then
            ASSESSMENT_TYPE="DAST Automated"
          fi
          echo "Target assessment type: $ASSESSMENT_TYPE"

          # Obtain Bearer token
          TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [[ -z "$TOKEN" ]]; then echo "ERROR: Could not obtain Bearer token."; exit 1; fi
          echo "*** obtained."

          # Lookup exact timeZone string for Mountain Time
          curl -s -X GET "${FOD_URL}/api/v3/lookup-items?type=TimeZones" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json" > /tmp/tz_response.json
          TIME_ZONE=$(python3 /tmp/tz_lookup.py < /tmp/tz_response.json 2>/dev/null || echo "Mountain Standard Time")
          echo "TimeZone: $TIME_ZONE"

          # Get assessmentTypeId and entitlementId from release-level assessment types
          echo "--- Release-level assessment types ---"
          curl -s -X GET \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/assessment-types?scanType=Dynamic" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json" > /tmp/at_release.json
          echo "Assessment types response: $(cat /tmp/at_release.json)"

          export ASSESSMENT_TYPE
          AT_INFO=$(python3 /tmp/get_at_id.py 2>&1 | grep -v "^Available" | grep -v "^  " | head -1)
          # Capture stderr separately for debug
          python3 /tmp/get_at_id.py > /tmp/at_info_out.txt 2>/tmp/at_info_err.txt || true
          cat /tmp/at_info_err.txt
          AT_INFO=$(cat /tmp/at_info_out.txt)

          if [[ -z "$AT_INFO" ]]; then
            echo "ERROR: Could not resolve assessment type info for '$ASSESSMENT_TYPE'"
            exit 1
          fi
          echo "Resolved AT_INFO: $AT_INFO"

          # Build and send the payload to the DAST Automated website-scan-setup endpoint
          PAYLOAD=$(AT_INFO="$AT_INFO" TIME_ZONE="$TIME_ZONE" SITE_URL="http://zero.webappsecurity.com/" python3 /tmp/build_payload.py)
          echo "Payload: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/dast-automated-scans/website-scan-setup" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" && "$HTTP_CODE" != "204" ]]; then
            echo "ERROR: DAST Automated scan setup failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Start FoD DAST Automated Scan
        run: |
          # Obtain a fresh Bearer token
          TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [[ -z "$TOKEN" ]]; then echo "ERROR: Could not obtain Bearer token."; exit 1; fi

          # Check for any in-progress scan and cancel it
          echo "Checking for in-progress scans..."
          SCANS=$(curl -s -X GET \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/scans?limit=5" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/json")
          echo "Recent scans: $SCANS"
          IN_PROGRESS_ID=$(echo "$SCANS" | python3 /tmp/find_inprogress.py 2>/dev/null || echo "")

          if [[ -n "$IN_PROGRESS_ID" && "$IN_PROGRESS_ID" =~ ^[0-9]+$ ]]; then
            echo "Cancelling in-progress scan ID: $IN_PROGRESS_ID"
            curl -s -X POST \
              "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/scans/${IN_PROGRESS_ID}/cancel-scan" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" || true
            echo "Waiting 30s for cancellation to complete..."
            sleep 30
          fi

          # Start the DAST Automated scan via REST API
          echo "Starting DAST Automated scan for release $FOD_RELEASE_ID..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/dast-automated-scans/start-scan" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Content-Length: 0" \
            -d "")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "201" && "$HTTP_CODE" != "202" ]]; then
            echo "ERROR: Failed to start DAST Automated scan with HTTP $HTTP_CODE"
            exit 1
          fi

          # Extract scan ID from start-scan response
          SCAN_ID=$(echo "$BODY" | python3 /tmp/get_scan_id.py 2>/dev/null || echo "")

          # If start-scan response didn't include a scanId, fetch the most recently created scan
          if [[ -z "$SCAN_ID" || ! "$SCAN_ID" =~ ^[0-9]+$ ]]; then
            echo "Scan ID not in start-scan response. Fetching latest scan from release..."
            sleep 5
            LATEST=$(curl -s -X GET \
              "${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/scans?limit=1" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/json")
            echo "Latest scan response: $LATEST"
            SCAN_ID=$(echo "$LATEST" | python3 /tmp/get_scan_id_from_list.py 2>/dev/null || echo "")
          fi

          echo "Scan started. Scan ID: ${SCAN_ID}"
          echo "DAST_SCAN_ID=${SCAN_ID}" >> $GITHUB_ENV

      - name: Wait for DAST Scan Completion
        run: |
          echo "Waiting for DAST Automated scan (ID: ${DAST_SCAN_ID}) on release ${FOD_RELEASE_ID} to complete..."

          if [[ -z "$DAST_SCAN_ID" || ! "$DAST_SCAN_ID" =~ ^[0-9]+$ ]]; then
            echo "ERROR: DAST_SCAN_ID is not set or invalid ('${DAST_SCAN_ID}'). Cannot poll for completion."
            exit 1
          fi

          # Obtain a fresh Bearer token
          TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [[ -z "$TOKEN" ]]; then echo "ERROR: Could not obtain Bearer token."; exit 1; fi

          # Wait up to 15 seconds for the scan to transition out of Queued/Scheduled
          # before entering the main poll loop, so we don't immediately see a stale state
          echo "Giving scan 15 seconds to initialize..."
          sleep 15

          MAX_WAIT=7200  # 2 hours max
          INTERVAL=60
          ELAPSED=15
          TOKEN_REFRESH=1800  # Refresh token every 30 minutes
          LAST_REFRESH=0
          POLL_URL="${FOD_URL}/api/v3/releases/${FOD_RELEASE_ID}/scans/${DAST_SCAN_ID}/polling-summary"

          echo "Polling URL: $POLL_URL"

          while [[ $ELAPSED -lt $MAX_WAIT ]]; do
            # Refresh token every 30 minutes
            if [[ $((ELAPSED - LAST_REFRESH)) -ge $TOKEN_REFRESH ]]; then
              TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
              LAST_REFRESH=$ELAPSED
              echo "Token refreshed at ${ELAPSED}s"
            fi

            # Poll the dedicated polling-summary endpoint for this specific scan ID
            STATUS_RESP=$(curl -s -X GET "$POLL_URL" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/json")

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$POLL_URL" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/json")

            # Always log the raw response for full visibility
            echo "Elapsed: ${ELAPSED}s | HTTP: ${HTTP_STATUS} | Raw: ${STATUS_RESP}"

            # If the endpoint returns 404, the scan may not be visible yet - keep waiting
            if [[ "$HTTP_STATUS" == "404" ]]; then
              echo "Scan not yet visible in API (404). Waiting..."
              sleep $INTERVAL
              ELAPSED=$((ELAPSED + INTERVAL))
              continue
            fi

            STATUS=$(echo "$STATUS_RESP" | python3 /tmp/get_poll_status.py 2>/dev/null || echo "Unknown")
            echo "Scan status: $STATUS"

            STATUS_LOWER="${STATUS,,}"
            # Terminal states from AnalysisStatusTypeEnum: Completed, Canceled, Waiting (paused)
            # Also handle: Failed, Error, Cancelled (alternate spelling)
            if [[ "$STATUS_LOWER" == "completed" || "$STATUS_LOWER" == "complete" || \
                  "$STATUS_LOWER" == "cancelled" || "$STATUS_LOWER" == "canceled" || \
                  "$STATUS_LOWER" == "failed" || "$STATUS_LOWER" == "error" ]]; then
              echo "Scan reached terminal state: $STATUS"
              echo "SCAN_FINAL_STATUS=${STATUS}" >> $GITHUB_ENV
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [[ $ELAPSED -ge $MAX_WAIT ]]; then
            echo "WARNING: Scan did not complete within $MAX_WAIT seconds. Proceeding anyway."
            echo "SCAN_FINAL_STATUS=Timeout" >> $GITHUB_ENV
          fi

          echo "Final scan status: ${SCAN_FINAL_STATUS:-Unknown}"

      - name: Export DAST Results to GitHub Security
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Obtain a fresh Bearer token for the export step
          TOKEN=$(curl -s -X POST "${FOD_URL}/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=${FOD_CLIENT_ID}&client_secret=${FOD_CLIENT_SECRET}&scope=api-tenant" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))")
          if [[ -z "$TOKEN" ]]; then echo "ERROR: Could not obtain Bearer token."; exit 1; fi

          # Write the DAST-to-SARIF converter script
          echo "" | base64 -d > /tmp/fod_dast_to_sarif.py

          # Run the converter: fetches DAST vulnerabilities and writes SARIF
          FOD_BASE_URL="${FOD_URL}" \
          FOD_TOKEN="${TOKEN}" \
          FOD_RELEASE_ID="${FOD_RELEASE_ID}" \
          SARIF_OUTPUT="./gh-fortify-dast.sarif" \
          python3 /tmp/fod_dast_to_sarif.py

          echo "SARIF file size: $(wc -c < ./gh-fortify-dast.sarif) bytes"
          echo "SARIF result count: $(python3 -c "import json; d=json.load(open('./gh-fortify-dast.sarif')); print(len(d['runs'][0]['results']))")"

      - name: Upload DAST SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./gh-fortify-dast.sarif
          category: fortify-dast

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fod-dast-sarif-files
          path: ./gh-fortify-dast.sarif
          retention-days: 5

      - name: Logout from Fortify on Demand
        if: always()
        run: fcli fod session logout
