name: Fortify FoD DAST Automated Scan
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write   # Required to publish to GitHub Security tab

env:
  FOD_URL: ${{ vars.FOD_URL }}
  FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
  FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
  FOD_RELEASE: ${{ vars.FOD_RELEASE }}

jobs:
  fod-dast-scan:
    runs-on: ubuntu-latest

    steps:
      # Install fcli via the official Fortify setup action
      - name: Setup Fortify tools
        uses: fortify/github-action/setup@v1
        with:
          fcli: latest

      # Sanitize FOD_URL: fall back to US data center if variable is empty,
      # and ensure the URL always starts with https://.
      - name: Sanitize FOD_URL
        run: |
          RAW_URL="${FOD_URL}"
          if [[ -z "$RAW_URL" ]]; then
            RAW_URL="https://api.ams.fortify.com"
          fi
          RAW_URL="${RAW_URL%/}"
          if [[ "$RAW_URL" != https://* && "$RAW_URL" != http://* ]]; then
            RAW_URL="https://${RAW_URL}"
          fi
          echo "Resolved FOD_URL: ${RAW_URL}"
          echo "FOD_URL=${RAW_URL}" >> $GITHUB_ENV

      # Authenticate to Fortify on Demand
      - name: Login to Fortify on Demand
        run: |
          fcli fod session login \
            --url "$FOD_URL" \
            --client-id "$FOD_CLIENT_ID" \
            --client-secret "$FOD_CLIENT_SECRET"

      # Validate required variables and auto-discover release + assessment type
      - name: Validate and Resolve Required Variables
        run: |
          echo "=== Checking required variables ==="

          # --- Validate FOD_RELEASE ---
          if [[ -z "$FOD_RELEASE" ]]; then
            echo ""
            echo "ERROR: FOD_RELEASE is not set."
            echo "Please add it under: GitHub repo → Settings → Variables → Actions → New repository variable"
            echo "Format: <AppName>:<ReleaseName>  e.g.  ZeroBank:main"
            echo ""
            echo "Available releases in your FoD tenant:"
            fcli fod release list -o table 2>/dev/null || true
            exit 1
          fi
          echo "FOD_RELEASE: $FOD_RELEASE"

          # --- Resolve FOD_ASSESSMENT_TYPE ---
          echo ""
          echo "=== Available assessment types for release: $FOD_RELEASE ==="
          fcli fod release lsat --rel "$FOD_RELEASE" -o table 2>/dev/null || true

          # Try to find a DAST-related assessment type automatically
          ASSESSMENT_TYPE=$(fcli fod release lsat --rel "$FOD_RELEASE" \
            -o expr="{assessmentTypeName}" 2>/dev/null \
            | grep -iE "(DAST|Dynamic)" | head -1 || true)

          # Fall back to the first available type
          if [[ -z "$ASSESSMENT_TYPE" ]]; then
            ASSESSMENT_TYPE=$(fcli fod release lsat --rel "$FOD_RELEASE" \
              -o expr="{assessmentTypeName}" 2>/dev/null | head -1 || true)
          fi

          if [[ -z "$ASSESSMENT_TYPE" ]]; then
            echo ""
            echo "ERROR: Could not determine a valid assessment type for release '$FOD_RELEASE'."
            echo "Check the table printed above and set vars.FOD_ASSESSMENT_TYPE in your repository variables."
            exit 1
          fi

          echo "Resolved assessment type: $ASSESSMENT_TYPE"
          echo "FOD_ASSESSMENT_TYPE=${ASSESSMENT_TYPE}" >> $GITHUB_ENV

      # Configure the DAST Automated Website scan settings for the release.
      - name: Configure DAST Automated Scan Settings
        run: |
          echo "Setting up DAST Website scan:"
          echo "  Release:         $FOD_RELEASE"
          echo "  Assessment Type: $FOD_ASSESSMENT_TYPE"
          echo "  Target URL:      http://zero.webappsecurity.com/"
          fcli fod dast-scan setup-website \
            --rel "$FOD_RELEASE" \
            --url "http://zero.webappsecurity.com/" \
            --assessment-type "$FOD_ASSESSMENT_TYPE" \
            --frequency Subscription \
            --skip-if-exists

      # Start the DAST Automated scan
      - name: Start FoD DAST Automated Scan
        run: |
          fcli fod dast-scan start \
            --rel "$FOD_RELEASE" \
            --store curScan

      # Poll until scan completes
      - name: Wait for DAST Scan Completion
        run: |
          fcli fod dast-scan wait-for \
            --rel "$FOD_RELEASE"

      # Export SARIF results to GitHub Security tab
      - name: Export Results to GitHub Security
        uses: fortify/github-action/fod-export@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Always clean up the session
      - name: Logout from Fortify on Demand
        if: always()
        run: fcli fod session logout
