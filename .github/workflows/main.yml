name: Fortify FoD DAST Automated Scan
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write   # Required to publish to GitHub Security tab

env:
  FOD_URL: ${{ vars.FOD_URL }}
  FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
  FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
  FOD_RELEASE: ${{ vars.FOD_RELEASE }}

jobs:
  fod-dast-scan:
    runs-on: ubuntu-latest

    steps:
      # Install fcli via the official Fortify setup action
      - name: Setup Fortify tools
        uses: fortify/github-action/setup@v1
        with:
          fcli: latest

      # Sanitize FOD_URL: fall back to US data center if variable is empty,
      # and ensure the URL always starts with https://.
      - name: Sanitize FOD_URL
        run: |
          RAW_URL="${FOD_URL}"
          if [[ -z "$RAW_URL" ]]; then
            RAW_URL="https://api.ams.fortify.com"
          fi
          RAW_URL="${RAW_URL%/}"
          if [[ "$RAW_URL" != https://* && "$RAW_URL" != http://* ]]; then
            RAW_URL="https://${RAW_URL}"
          fi
          echo "Resolved FOD_URL: ${RAW_URL}"
          echo "FOD_URL=${RAW_URL}" >> $GITHUB_ENV

      # Authenticate to Fortify on Demand
      - name: Login to Fortify on Demand
        run: |
          fcli fod session login \
            --url "$FOD_URL" \
            --client-id "$FOD_CLIENT_ID" \
            --client-secret "$FOD_CLIENT_SECRET"

      # Resolve the numeric release ID from the release name.
      # fcli setup-website requires either a numeric ID or "App:Release" format.
      # We look up the release by name and store its numeric releaseId.
      - name: Resolve Release ID
        run: |
          if [[ -z "$FOD_RELEASE" ]]; then
            echo "ERROR: FOD_RELEASE is not set."
            echo "Go to: GitHub repo → Settings → Variables → Actions → New repository variable"
            echo "  Name:  FOD_RELEASE"
            echo "  Value: <AppName>:<ReleaseName>  e.g.  ZeroBank:main"
            echo ""
            echo "Available releases in your FoD tenant:"
            fcli fod release list -o table 2>/dev/null || true
            exit 1
          fi

          echo "Looking up release: $FOD_RELEASE"
          echo ""
          echo "=== All releases ==="
          fcli fod release list -o table 2>/dev/null || true

          # Extract app name and release name from "App:Release" format
          APP_NAME="${FOD_RELEASE%%:*}"
          REL_NAME="${FOD_RELEASE##*:}"

          echo ""
          echo "App: $APP_NAME  |  Release: $REL_NAME"

          # Get the numeric release ID by filtering on releaseName
          RELEASE_ID=$(fcli fod release list \
            -o expr="{releaseId}" \
            -q "releaseName=='${REL_NAME}' && applicationName=='${APP_NAME}'" \
            2>/dev/null | head -1 | tr -d '[:space:]' || true)

          if [[ -z "$RELEASE_ID" ]]; then
            # Fallback: try matching by releaseName only
            RELEASE_ID=$(fcli fod release list \
              -o expr="{releaseId}" \
              -q "releaseName=='${REL_NAME}'" \
              2>/dev/null | head -1 | tr -d '[:space:]' || true)
          fi

          if [[ -z "$RELEASE_ID" ]]; then
            echo "ERROR: Could not find a release matching '$FOD_RELEASE'."
            echo "Check the releases table above for the correct App:Release name."
            exit 1
          fi

          echo "Resolved Release ID: $RELEASE_ID"
          echo "FOD_RELEASE_ID=${RELEASE_ID}" >> $GITHUB_ENV

      # Configure the DAST Automated Website scan using the numeric release ID.
      # Assessment type "Dynamic Website Assessment" confirmed available in this tenant.
      - name: Configure DAST Automated Scan Settings
        run: |
          # Use vars.FOD_ASSESSMENT_TYPE if explicitly set, otherwise use the confirmed name
          ASSESSMENT_TYPE="${{ vars.FOD_ASSESSMENT_TYPE }}"
          if [[ -z "$ASSESSMENT_TYPE" ]]; then
            ASSESSMENT_TYPE="DAST Automated"
          fi

          echo "Setting up DAST Website scan:"
          echo "  Release ID:      $FOD_RELEASE_ID"
          echo "  Assessment Type: $ASSESSMENT_TYPE"
          echo "  Target URL:      http://zero.webappsecurity.com/"

          fcli fod dast-scan setup-website \
            --rel "$FOD_RELEASE_ID" \
            --url "http://zero.webappsecurity.com/" \
            --assessment-type "$ASSESSMENT_TYPE" \
            --frequency Subscription \
            --skip-if-exists

      # Start the DAST Automated scan
      - name: Start FoD DAST Automated Scan
        run: |
          fcli fod dast-scan start \
            --rel "$FOD_RELEASE_ID" \
            --store curScan

      # Poll until scan completes
      - name: Wait for DAST Scan Completion
        run: |
          fcli fod dast-scan wait-for \
            --rel "$FOD_RELEASE_ID"

      # Export SARIF results to GitHub Security tab
      - name: Export Results to GitHub Security
        uses: fortify/github-action/fod-export@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Always clean up the session
      - name: Logout from Fortify on Demand
        if: always()
        run: fcli fod session logout
